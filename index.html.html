<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SafePulse</title>
  <meta name="description" content="SafePulse - Tu seguridad está en nuestras manos. Aplicación de seguridad personal." />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=Barlow+Condensed:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #FFB800;
      --gold-bright: #FFC930;
      --gold-glow: rgba(255, 184, 0, 0.5);
      --gold-dim: rgba(255, 184, 0, 0.15);
      --bg: #0a0a0a;
      --white: #ffffff;
      --city-color: rgba(255, 184, 0, 0.18);

      /* Skeleton colors */
      --skel-base: #1a1a1a;
      --skel-shine: #2a2a2a;
      --skel-highlight: #333333;
    }

    html, body {
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 0 0 1px #222, 0 30px 80px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ============================================================
       SKELETON LOADING LAYER
       ============================================================ */
    .skeleton-layer {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .skeleton-layer.hidden {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
    }

    /* Shimmer animation */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .skel-shimmer {
      background: linear-gradient(
        110deg,
        var(--skel-base) 0%,
        var(--skel-base) 30%,
        var(--skel-shine) 38%,
        var(--skel-highlight) 42%,
        var(--skel-shine) 46%,
        var(--skel-base) 54%,
        var(--skel-base) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }

    /* Skeleton Skip Button */
    .skel-skip {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 66px;
      height: 30px;
      border-radius: 12px;
      animation-delay: 0.1s;
    }

    /* Skeleton Content Container */
    .skel-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -60px;
    }

    /* Skeleton Radar Rings */
    .skel-radar {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .skel-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid var(--skel-shine);
      animation: skeleton-pulse 2s ease-in-out infinite;
    }

    .skel-ring-1 {
      width: 260px;
      height: 260px;
      animation-delay: 0s;
    }

    .skel-ring-2 {
      width: 200px;
      height: 200px;
      animation-delay: 0.3s;
    }

    /* Skeleton Icon Circle */
    .skel-icon-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1.5px solid var(--skel-shine);
      display: flex;
      align-items: center;
      justify-content: center;
      animation-delay: 0.2s;
    }

    /* Skeleton Siren Placeholder */
    .skel-siren {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .skel-siren-top {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      animation-delay: 0.3s;
    }

    .skel-siren-dome {
      width: 40px;
      height: 30px;
      border-radius: 6px 6px 0 0;
      clip-path: polygon(20% 100%, 50% 0%, 80% 100%);
      animation-delay: 0.4s;
    }

    .skel-siren-body {
      width: 50px;
      height: 12px;
      border-radius: 4px;
      animation-delay: 0.5s;
    }

    .skel-siren-wave-l,
    .skel-siren-wave-r {
      position: absolute;
      width: 8px;
      height: 35px;
      border-radius: 4px;
      top: 50%;
      transform: translateY(-50%);
      animation-delay: 0.6s;
    }

    .skel-siren-wave-l { left: 42px; }
    .skel-siren-wave-r { right: 42px; }

    /* Skeleton Logo Text */
    .skel-logo {
      width: 220px;
      height: 48px;
      border-radius: 10px;
      animation-delay: 0.4s;
    }

    /* Skeleton Pulse Line */
    .skel-pulse-line {
      margin: 14px 0 12px;
      width: 280px;
      height: 4px;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      animation-delay: 0.5s;
    }

    /* Skeleton Tagline */
    .skel-tagline {
      width: 250px;
      height: 14px;
      border-radius: 7px;
      animation-delay: 0.6s;
    }

    /* Skeleton City Skyline */
    .skel-city {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      overflow: hidden;
    }

    .skel-building {
      position: absolute;
      bottom: 0;
      border-radius: 3px 3px 0 0;
      animation: skeleton-pulse 2s ease-in-out infinite;
    }

    .skel-b1  { left: 5%;  width: 6%; height: 60px; background: var(--skel-base); animation-delay: 0.1s; }
    .skel-b2  { left: 13%; width: 5%; height: 80px; background: var(--skel-shine); animation-delay: 0.2s; }
    .skel-b3  { left: 20%; width: 7%; height: 50px; background: var(--skel-base); animation-delay: 0.3s; }
    .skel-b4  { left: 29%; width: 5%; height: 90px; background: var(--skel-shine); animation-delay: 0.15s; }
    .skel-b5  { left: 36%; width: 6%; height: 65px; background: var(--skel-base); animation-delay: 0.25s; }
    .skel-b6  { left: 44%; width: 8%; height: 100px; background: var(--skel-shine); animation-delay: 0.35s; }
    .skel-b7  { left: 54%; width: 5%; height: 55px; background: var(--skel-base); animation-delay: 0.4s; }
    .skel-b8  { left: 61%; width: 7%; height: 85px; background: var(--skel-shine); animation-delay: 0.1s; }
    .skel-b9  { left: 70%; width: 5%; height: 70px; background: var(--skel-base); animation-delay: 0.2s; }
    .skel-b10 { left: 77%; width: 6%; height: 95px; background: var(--skel-shine); animation-delay: 0.3s; }
    .skel-b11 { left: 85%; width: 5%; height: 60px; background: var(--skel-base); animation-delay: 0.15s; }
    .skel-b12 { left: 92%; width: 6%; height: 75px; background: var(--skel-shine); animation-delay: 0.25s; }

    /* Skeleton glow line */
    .skel-glow-line {
      position: absolute;
      bottom: 88px;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 1px;
      animation-delay: 0.5s;
    }

    /* Small floating dots for extra detail */
    .skel-dot {
      position: absolute;
      border-radius: 50%;
      background: var(--skel-shine);
      animation: skeleton-pulse 2.5s ease-in-out infinite;
    }

    .skel-dot-1 { width: 6px; height: 6px; top: 15%; left: 12%; animation-delay: 0.5s; }
    .skel-dot-2 { width: 4px; height: 4px; top: 20%; right: 15%; animation-delay: 0.8s; }
    .skel-dot-3 { width: 5px; height: 5px; top: 60%; left: 8%; animation-delay: 1.1s; }
    .skel-dot-4 { width: 3px; height: 3px; top: 55%; right: 10%; animation-delay: 0.3s; }

    /* ============================================================
       REAL CONTENT LAYER
       ============================================================ */
    .real-content-layer {
      position: absolute;
      inset: 0;
      z-index: 40;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.1s,
                  transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .real-content-layer.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* === BACKGROUND NOISE + RADIAL GLOW === */
    .real-content-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 38%, rgba(255,184,0,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 90%, rgba(255,184,0,0.08) 0%, transparent 70%);
      z-index: 0;
    }

    /* === CITY SKYLINE === */
    .city {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      z-index: 1;
    }

    .city svg {
      width: 100%;
      height: 100%;
    }

    /* === HORIZONTAL GLOW LINE BELOW CITY === */
    .city-glow-line {
      position: absolute;
      bottom: 88px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-bright), var(--gold), transparent);
      filter: blur(1px);
      opacity: 0.7;
      z-index: 2;
    }

    /* === MAIN CONTENT === */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: -60px;
    }

    /* === RADAR RINGS === */
    .radar-wrapper {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid var(--gold-dim);
      animation: ring-pulse 3s ease-in-out infinite;
    }

    .ring-1 { width: 260px; height: 260px; animation-delay: 0s; }
    .ring-2 { width: 200px; height: 200px; animation-delay: 0.4s; border-color: rgba(255,184,0,0.22); }

    @keyframes ring-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.025); }
    }

    /* === ICON CIRCLE === */
    .icon-circle {
      width: 160px;
      height: 160px;
      background: radial-gradient(circle at 50% 40%, rgba(255,184,0,0.18) 0%, rgba(255,184,0,0.06) 60%, transparent 100%);
      border-radius: 50%;
      border: 1.5px solid rgba(255,184,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow:
        0 0 40px rgba(255,184,0,0.15),
        inset 0 0 30px rgba(255,184,0,0.08);
      animation: icon-glow 2.5s ease-in-out infinite alternate;
    }

    @keyframes icon-glow {
      from { box-shadow: 0 0 30px rgba(255,184,0,0.12), inset 0 0 20px rgba(255,184,0,0.06); }
      to   { box-shadow: 0 0 60px rgba(255,184,0,0.28), inset 0 0 40px rgba(255,184,0,0.12); }
    }

    /* === SIREN ICON (SVG inline) === */
    .siren-svg {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 12px rgba(255,184,0,0.8)) drop-shadow(0 0 30px rgba(255,184,0,0.4));
      animation: siren-flash 1.8s ease-in-out infinite alternate;
    }

    @keyframes siren-flash {
      from { filter: drop-shadow(0 0 10px rgba(255,184,0,0.7)) drop-shadow(0 0 24px rgba(255,184,0,0.35)); }
      to   { filter: drop-shadow(0 0 22px rgba(255,200,0,1.0)) drop-shadow(0 0 50px rgba(255,184,0,0.6)); }
    }

    /* === LOGO TEXT === */
    .logo-text {
      font-family: 'Barlow', sans-serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      text-align: center;
    }

    .real-content-layer.visible .logo-text {
      animation: reveal-up 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.15s both;
    }

    .logo-text .safe { color: var(--white); }
    .logo-text .pulse { color: var(--gold); }

    /* === PULSE LINE DIVIDER === */
    .pulse-line {
      margin: 14px 0 12px;
      width: 280px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .real-content-layer.visible .pulse-line {
      animation: reveal-up 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s both;
    }

    .pulse-line svg {
      width: 100%;
      height: 20px;
      overflow: visible;
    }

    /* === TAGLINE === */
    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.5px;
      text-align: center;
    }

    .real-content-layer.visible .tagline {
      animation: reveal-up 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.45s both;
    }

    @keyframes reveal-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Reveal animation for radar */
    .real-content-layer.visible .radar-wrapper {
      animation: reveal-scale 1s cubic-bezier(0.4, 0, 0.2, 1) 0s both;
    }

    @keyframes reveal-scale {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Reveal for city */
    .real-content-layer.visible .city {
      animation: reveal-city 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s both;
    }

    @keyframes reveal-city {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .real-content-layer.visible .city-glow-line {
      animation: reveal-glow 1s cubic-bezier(0.4, 0, 0.2, 1) 0.6s both;
    }

    @keyframes reveal-glow {
      from {
        opacity: 0;
        width: 0;
        left: 50%;
      }
      to {
        opacity: 0.7;
        width: 100%;
        left: 0;
      }
    }

    .fade-out {
      opacity: 0 !important;
    }

    .skip-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      z-index: 100;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .skip-btn:hover {
      color: var(--gold);
      background: rgba(255, 184, 0, 0.1);
      border-color: rgba(255, 184, 0, 0.3);
    }

    /* === LOADING PROGRESS BAR === */
    .skel-progress-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 60;
    }

    .skel-progress-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }

    .skel-progress-bar {
      width: 100%;
      height: 3px;
      background: var(--skel-base);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .skel-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--skel-shine), var(--skel-highlight), rgba(255,184,0,0.3));
      transition: width 0.3s ease;
    }

    /* Responsive — on very small screens still look good */
    @media (max-width: 420px) {
      .phone-frame {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <!-- ============================================================
         SKELETON LOADING LAYER
         ============================================================ -->
    <div class="skeleton-layer" id="skeletonLayer">

      <!-- Skeleton Skip Button -->
      <div class="skel-skip skel-shimmer"></div>

      <!-- Floating detail dots -->
      <div class="skel-dot skel-dot-1"></div>
      <div class="skel-dot skel-dot-2"></div>
      <div class="skel-dot skel-dot-3"></div>
      <div class="skel-dot skel-dot-4"></div>

      <!-- Skeleton Content -->
      <div class="skel-content">
        <!-- Radar Rings Skeleton -->
        <div class="skel-radar">
          <div class="skel-ring skel-ring-1"></div>
          <div class="skel-ring skel-ring-2"></div>
          <div class="skel-icon-circle skel-shimmer">
            <!-- Siren shape placeholder -->
            <div class="skel-siren">
              <div class="skel-siren-top skel-shimmer" style="background: var(--skel-highlight);"></div>
              <div class="skel-siren-dome skel-shimmer" style="background: var(--skel-highlight);"></div>
              <div class="skel-siren-body skel-shimmer" style="background: var(--skel-highlight);"></div>
            </div>
            <div class="skel-siren-wave-l skel-shimmer" style="background: var(--skel-highlight);"></div>
            <div class="skel-siren-wave-r skel-shimmer" style="background: var(--skel-highlight);"></div>
          </div>
        </div>

        <!-- Logo Skeleton -->
        <div class="skel-logo skel-shimmer"></div>

        <!-- Pulse Line Skeleton -->
        <div class="skel-pulse-line skel-shimmer"></div>

        <!-- Tagline Skeleton -->
        <div class="skel-tagline skel-shimmer"></div>
      </div>

      <!-- City Skyline Skeleton -->
      <div class="skel-city">
        <div class="skel-building skel-b1"></div>
        <div class="skel-building skel-b2"></div>
        <div class="skel-building skel-b3"></div>
        <div class="skel-building skel-b4"></div>
        <div class="skel-building skel-b5"></div>
        <div class="skel-building skel-b6"></div>
        <div class="skel-building skel-b7"></div>
        <div class="skel-building skel-b8"></div>
        <div class="skel-building skel-b9"></div>
        <div class="skel-building skel-b10"></div>
        <div class="skel-building skel-b11"></div>
        <div class="skel-building skel-b12"></div>
      </div>

      <!-- Skeleton glow line -->
      <div class="skel-glow-line skel-shimmer"></div>

      <!-- Loading progress -->
      <div class="skel-progress-container">
        <span class="skel-progress-text">Cargando</span>
        <div class="skel-progress-bar">
          <div class="skel-progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- ============================================================
         REAL CONTENT LAYER
         ============================================================ -->
    <div class="real-content-layer" id="realContent">

      <!-- Skip Button -->
      <a href="safepulse-register (3).html" class="skip-btn" id="skipBtn">Saltar ›</a>

      <!-- Background glow handled by ::before pseudo -->

      <!-- City Skyline -->
      <div class="city">
        <svg viewBox="0 0 390 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
          <defs>
            <linearGradient id="cityGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,184,0,0.22)"/>
              <stop offset="100%" stop-color="rgba(255,184,0,0.04)"/>
            </linearGradient>
            <!-- Dot matrix mask for buildings -->
            <pattern id="dots" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
              <rect width="1.5" height="1.5" fill="rgba(255,184,0,0.55)" rx="0.4"/>
            </pattern>
          </defs>

          <!-- City silhouette path -->
          <path d="
            M0,220
            L0,150
            L18,150 L18,130 L26,130 L26,110 L34,110 L34,130 L42,130 L42,150
            L50,150 L50,100 L58,100 L58,80 L62,80 L62,70 L66,70 L66,80 L70,80 L70,100 L78,100 L78,150
            L85,150 L85,120 L100,120 L100,150
            L108,150 L108,90 L116,90 L116,75 L122,75 L122,60 L128,60 L128,75 L134,75 L134,90 L142,90 L142,150
            L150,150 L150,130 L162,130 L162,150
            L170,150 L170,95 L178,95 L178,82 L182,82 L182,72 L186,72 L186,60 L190,60 L190,72 L194,72 L194,82 L198,82 L198,95 L206,95 L206,150
            L214,150 L214,118 L226,118 L226,150
            L234,150 L234,85 L242,85 L242,68 L248,68 L248,55 L254,55 L254,68 L260,68 L260,85 L268,85 L268,150
            L276,150 L276,125 L290,125 L290,150
            L298,150 L298,105 L306,105 L306,88 L312,88 L312,78 L316,78 L316,88 L322,88 L322,105 L330,105 L330,150
            L338,150 L338,135 L350,135 L350,150
            L358,150 L358,115 L366,115 L366,100 L372,100 L372,115 L378,115 L378,150
            L390,150 L390,220 Z
          " fill="url(#cityGrad)"/>

          <!-- Dot overlay on buildings -->
          <clipPath id="buildingClip">
            <path d="
              M0,220 L0,150
              L18,150 L18,130 L26,130 L26,110 L34,110 L34,130 L42,130 L42,150
              L50,150 L50,100 L58,100 L58,80 L62,80 L62,70 L66,70 L66,80 L70,80 L70,100 L78,100 L78,150
              L85,150 L85,120 L100,120 L100,150

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const skeletonLayer = document.getElementById("skeletonLayer");
      const realContent = document.getElementById("realContent");
      const progressFill = document.getElementById("progressFill");
      const skipBtn = document.getElementById("skipBtn");
      const frame = document.querySelector(".phone-frame");

      // Animate progress bar
      const loadDuration = 3000; // 3 seconds loading
      const progressSteps = [
        { time: 0,    width: "0%" },
        { time: 200,  width: "8%" },
        { time: 500,  width: "22%" },
        { time: 900,  width: "38%" },
        { time: 1300, width: "52%" },
        { time: 1700, width: "68%" },
        { time: 2100, width: "80%" },
        { time: 2500, width: "92%" },
        { time: 2800, width: "100%" }
      ];

      progressSteps.forEach(step => {
        setTimeout(() => {
          if (progressFill) {
            progressFill.style.width = step.width;
          }
        }, step.time);
      });

      // After loading, transition skeleton → real content
      setTimeout(() => {
        // Hide skeleton
        skeletonLayer.classList.add("hidden");

        // Show real content
        realContent.classList.add("visible");
      }, loadDuration);

      // Navigate away after content is shown (3s loading + 4s viewing = 7s total)
      function navigateToRegister() {
        frame.style.transition = "opacity 0.5s ease-in-out";
        frame.style.opacity = "0";
        setTimeout(() => {
          window.location.href = "safepulse-register (3).html";
        }, 500);
      }

      const navTimer = setTimeout(navigateToRegister, loadDuration + 4000);

      // Handle manual skip
      if (skipBtn) {
        skipBtn.addEventListener("click", (e) => {
          e.preventDefault();
          clearTimeout(navTimer);
          navigateToRegister();
        });
      }
    });
  </script>
